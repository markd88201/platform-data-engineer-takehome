name: Terraform CI

on:
  pull_request:
    paths:
      - "infra/**"

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - run: terraform init
      - run: terraform validate
      - run: terraform plan